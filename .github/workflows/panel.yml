name: Panel CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/panel/**'
      - '.github/workflows/panel.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/panel/**'
      - '.github/workflows/panel.yml'

jobs:
  build:
    name: Build & Test Panel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/panel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Run build
        run: npm run build
