services:
  # Single service: Backend API + Frontend SPA
  - type: web
    name: odontocix
    runtime: docker
    repo: https://github.com/omxrmtp/odontocix.git
    branch: main
    rootDir: .
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: APP_NAME
        value: OdontoCix
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://odontocix.onrender.com
      - key: APP_LOCALE
        value: es
      - key: APP_FALLBACK_LOCALE
        value: es
      - key: APP_FAKER_LOCALE
        value: es_PE
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_STACK
        value: single
      - key: LOG_DEPRECATIONS_CHANNEL
        value: "null"
      - key: LOG_LEVEL
        value: warning
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        sync: false
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_LIFETIME
        value: "120"
      - key: SESSION_ENCRYPT
        value: "false"
      - key: SESSION_PATH
        value: /
      - key: SESSION_DOMAIN
        value: "null"
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: BROADCAST_CONNECTION
        value: log
      - key: FILESYSTEM_DISK
        value: local
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: MAIL_MAILER
        value: resend
      - key: MAIL_FROM_ADDRESS
        value: noreply@odontocix.com
      - key: MAIL_FROM_NAME
        value: OdontoCix
      - key: SANCTUM_STATEFUL_DOMAINS
        value: odontocix.onrender.com,www.odontocix.onrender.com
      - key: FRONTEND_URL
        value: https://odontocix.onrender.com
      - key: RENIEC_API_URL
        value: https://api.decolecta.com/v1/reniec/dni
      - key: RENIEC_API_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SANCTUM_TOKEN_EXPIRATION
        value: "10080"
      - key: DEMO_TENANT_EMAIL
        value: demo@odontocix.com
      - key: DEMO_TENANT_NAME
        value: "Clinica Demo"
      - key: DEMO_TENANT_RUC
        value: "12345678901"
      - key: DEMO_TENANT_PHONE
        value: "999000000"
      - key: DEMO_TENANT_ADDRESS
        value: "Av. Demostracion 123"
      - key: DEMO_ADMIN_EMAIL
        value: admin@odontocix.com
      - key: DEMO_ADMIN_PASSWORD
        sync: false
    buildCommand: ""
    healthCheckPath: /health
    numInstances: 1
    plan: starter
