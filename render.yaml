services:
  # Backend API (Laravel)
  - type: web
    name: odontocix-api
    runtime: docker
    repo: https://github.com/omxrmtp/odontocix.git
    branch: main
    rootDir: .
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: APP_NAME
        value: OdontoCix
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://odontocix-api.onrender.com
      - key: APP_LOCALE
        value: es
      - key: APP_FALLBACK_LOCALE
        value: es
      - key: APP_FAKER_LOCALE
        value: es_PE
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_STACK
        value: single
      - key: LOG_DEPRECATIONS_CHANNEL
        value: "null"
      - key: LOG_LEVEL
        value: warning
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        sync: false  # Set manually in Render dashboard with your Neon DB URL
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_LIFETIME
        value: "120"
      - key: SESSION_ENCRYPT
        value: "false"
      - key: SESSION_PATH
        value: /
      - key: SESSION_DOMAIN
        value: "null"
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: BROADCAST_CONNECTION
        value: log
      - key: FILESYSTEM_DISK
        value: local
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: MAIL_MAILER
        value: resend
      - key: MAIL_FROM_ADDRESS
        value: noreply@odontocix.com
      - key: MAIL_FROM_NAME
        value: OdontoCix
      - key: SANCTUM_STATEFUL_DOMAINS
        value: odontocix.onrender.com,odontocix-api.onrender.com,www.odontocix.onrender.com
      - key: FRONTEND_URL
        value: https://odontocix.onrender.com
      - key: RENIEC_API_URL
        value: https://api.decolecta.com/v1/reniec/dni
      - key: RENIEC_API_TOKEN
        sync: false  # Set manually in Render dashboard
      - key: RESEND_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: SANCTUM_TOKEN_EXPIRATION
        value: "10080"
      - key: DEMO_TENANT_EMAIL
        value: demo@odontocix.com
      - key: DEMO_TENANT_NAME
        value: "Clínica Demo"
      - key: DEMO_TENANT_RUC
        value: "12345678901"
      - key: DEMO_TENANT_PHONE
        value: "999000000"
      - key: DEMO_TENANT_ADDRESS
        value: "Av. Demostración 123"
      - key: DEMO_ADMIN_EMAIL
        value: admin@odontocix.com
      - key: DEMO_ADMIN_PASSWORD
        sync: false  # Set manually in Render dashboard (use strong password)
    buildCommand: ""  # Docker build handles everything
    startCommand: sh docker/start.sh
    healthCheckPath: /health
    numInstances: 1
    plan: starter

  # Frontend (React Static Site)
  - type: static
    name: odontocix
    runtime: static
    repo: https://github.com/omxrmtp/odontocix.git
    branch: main
    rootDir: apps/panel
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://odontocix-api.onrender.com
    routes:
      - type: rewrite
        source: /api/*
        destination: https://odontocix-api.onrender.com/api/$1
      - type: rewrite
        source: /portal/*
        destination: https://odontocix-api.onrender.com/portal/$1
      - type: rewrite
        source: /online-booking/*
        destination: https://odontocix-api.onrender.com/online-booking/$1
      - type: rewrite
        source: /pdf/*
        destination: https://odontocix-api.onrender.com/pdf/$1
      - type: rewrite
        source: /auth/*
        destination: https://odontocix-api.onrender.com/auth/$1
      - type: rewrite
        source: /dashboard/*
        destination: https://odontocix-api.onrender.com/dashboard/$1
      - type: rewrite
        source: /reniec/*
        destination: https://odontocix-api.onrender.com/reniec/$1
      - type: rewrite
        source: /profile/*
        destination: https://odontocix-api.onrender.com/profile/$1
      - type: rewrite
        source: /tenant/*
        destination: https://odontocix-api.onrender.com/tenant/$1
      - type: rewrite
        source: /*
        destination: /index.html
